name: Validate README usage instructions

on:
  workflow_dispatch:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches: [main]
    paths:
      - '*/pyproject.toml'
      - '*/src/**'
      - '*/deployment/**'
      - '.github/workflows/validate_usage_instructions.yml'

jobs:
  discover:
    if: github.event.pull_request.draft == false || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    outputs:
      tools: ${{ steps.find.outputs.tools }}
    steps:
      - uses: actions/checkout@v4

      - id: find
        run: |
          echo "tools=$(find . -mindepth 2 -maxdepth 2 -name pyproject.toml -printf '%h\n' | sed 's|^\./||' | jq -R -s -c 'split("\n") | map(select(length > 0))')" >> "$GITHUB_OUTPUT"

  validate:
    needs: discover
    runs-on: ubuntu-latest
    strategy:
      matrix:
        tool: ${{ fromJson(needs.discover.outputs.tools) }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Validate Mode A - Direct run (no package install)
        run: |
          pip install -r ${{ matrix.tool }}/requirements.txt
          python ${{ matrix.tool }} https://example.invalid/for-testing 2>&1 || true
          # Verify no ModuleNotFoundError (should only fail on the tool's own input validation)
          if python ${{ matrix.tool }} https://example.invalid/for-testing 2>&1 | grep -q "ModuleNotFoundError"; then
            echo "Mode A failed: ModuleNotFoundError present"
            exit 1
          fi
          echo "✓ Mode A passed (no import errors)"

      - name: Validate Mode B - Installed module (pip install)
        run: |
          # Fresh venv to test clean install
          python -m venv test_env
          . test_env/bin/activate
          pip install --upgrade pip
          pip install ${{ matrix.tool }}/
          python -m ${{ matrix.tool }} https://example.invalid/for-testing 2>&1 || true
          # Verify no ModuleNotFoundError
          if python -m ${{ matrix.tool }} https://example.invalid/for-testing 2>&1 | grep -q "ModuleNotFoundError"; then
            echo "Mode B failed: ModuleNotFoundError present"
            exit 1
          fi
          echo "✓ Mode B passed (no import errors)"

      - name: Validate Mode C - Notebook execution
        run: |
          pip install ${{ matrix.tool }}/
          pip install nbconvert jupyter
          jupyter nbconvert --to notebook --execute \
            ${{ matrix.tool }}/deployment/${{ matrix.tool }}.ipynb \
            --output /tmp/notebook_out.ipynb
          echo "✓ Mode C passed (notebook executed without errors)"

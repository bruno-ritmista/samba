name: Validate README Instructions

on:
  push:
    branches: [main]
    paths:
      - 'sheets_to_banana/**'
      - '.github/workflows/validate_instructions.yml'
  pull_request:
    branches: [main]
    paths:
      - 'sheets_to_banana/**'
      - '.github/workflows/validate_instructions.yml'

jobs:
  validate:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.13']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Validate Mode A - Direct run (no package install)
        working-directory: .
        run: |
          pip install -r sheets_to_banana/requirements.txt
          python sheets_to_banana https://docs.google.com/spreadsheets/d/INVALID_ID_FOR_TESTING/edit 2>&1 || true
          # Verify no ModuleNotFoundError (should only fail on HTTP/fetch error)
          if python sheets_to_banana https://docs.google.com/spreadsheets/d/INVALID_ID_FOR_TESTING/edit 2>&1 | grep -q "ModuleNotFoundError"; then
            echo "Mode A failed: ModuleNotFoundError present"
            exit 1
          fi
          echo "✓ Mode A passed (no import errors)"

      - name: Validate Mode B - Installed module (pip install)
        working-directory: .
        run: |
          # Fresh venv to test clean install
          python -m venv test_env
          . test_env/bin/activate
          pip install --upgrade pip
          pip install sheets_to_banana/
          python -m sheets_to_banana https://docs.google.com/spreadsheets/d/INVALID_ID_FOR_TESTING/edit 2>&1 || true
          # Verify no ModuleNotFoundError
          if python -m sheets_to_banana https://docs.google.com/spreadsheets/d/INVALID_ID_FOR_TESTING/edit 2>&1 | grep -q "ModuleNotFoundError"; then
            echo "Mode B failed: ModuleNotFoundError present"
            exit 1
          fi
          echo "✓ Mode B passed (no import errors)"

      - name: Run test suite
        working-directory: sheets_to_banana
        run: |
          pip install -r requirements.txt
          pip install -r doc/requirements-dev.txt
          pytest tests/ -v

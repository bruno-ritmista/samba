name: Test suite

on:
  workflow_run:
    workflows: ["Validate README usage instructions"]
    types: [completed]

jobs:
  discover:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    outputs:
      tools: ${{ steps.find.outputs.tools }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - id: find
        run: |
          echo "tools=$(find . -mindepth 2 -maxdepth 2 -name pyproject.toml -printf '%h\n' | sed 's|^\./||' | jq -R -s -c 'split("\n") | map(select(length > 0))')" >> "$GITHUB_OUTPUT"

  test:
    needs: discover
    runs-on: ubuntu-latest
    strategy:
      matrix:
        tool: ${{ fromJson(needs.discover.outputs.tools) }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Run test suite
        working-directory: ${{ matrix.tool }}
        run: |
          pip install .
          pip install -r doc/requirements-dev.txt
          pytest tests/ -v
